solute; top: 2px; font-size: 8px; color: #666; transform: translateX(-50%); }\n.editor-wrap { flex: 1; overflow: auto; position: relative; }\n.editor-inner { display: flex; justify-content: center; min-height: 100%; }\n.vruler { width: 22px; background: #f3f3f3; border-right: 1px solid #c8c8c8; display: none; flex-shrink: 0; position: relative; }\n.vruler.show { display: block; }\n.vruler .margin-zone { position: absolute; left: 0; width: 100%; background: rgba(200,220,240,.4); }\n.vtick { position: absolute; right: 0; height: 1px; background: #888; }\n.vtick-num { position: absolute; left: 2px; font-size: 8px; color: #666; transform: translateY(-50%); }\n.page { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.15); margin: 24px auto; position: relative; }\n.page.gridlines { background-image: linear-gradient(#e8e8e8 1px, transparent 1px), linear-gradient(90deg, #e8e8e8 1px, transparent 1px); background-size: 20px 20px; }\n#editor { outline: none; min-height: 200px; font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.5; color: #000; }\n#editor:focus { outline: none; }\n#editor p { margin: 0 0 6px 0; min-height: 1.4em; }\n#editor table { border-collapse: collapse; width: 100%; margin: 6px 0; }\n#editor td, #editor th { border: 1px solid #999; padding: 5px 7px; min-width: 36px; }\n#editor th { background: #f5f5f5; font-weight: bold; }\n#editor img { max-width: 100%; height: auto; display: inline-block; }\n#editor hr { border: none; border-top: 1px solid #ccc; margin: 10px 0; }\n#editor blockquote { border-left: 3px solid #ccc; margin: 6px 0; padding-left: 14px; color: #555; }\n#editor ul, #editor ol { margin: 3px 0; padding-left: 30px; }\n#editor li { margin: 1px 0; }\n#editor h1 { font-size: 22pt; font-weight: bold; margin: 10px 0 6px; }\n#editor h2 { font-size: 16pt; font-weight: bold; margin: 8px 0 4px; }\n#editor h3 { font-size: 13pt; font-weight: bold; margin: 6px 0 3px; }\n#editor a { color: #0563c1; text-decoration: underline; }\n#ed k=\"closeDialog()\">取消</button><button class=\"primary\" onclick=\"doInsertLink()\">插入</button></div>\n</div>\n\n<div class=\"dialog\" id=\"shortcutDlg\" style=\"display:none\">\n  <div class=\"dialog-header\"><svg width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" viewBox=\"0 0 24 24\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"12\" rx=\"2\"/><path d=\"M6 6V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2\"/><circle cx=\"12\" cy=\"12\" r=\"2\"/><path d=\"M12 14v-2\"/></svg> 快捷键自定义</div>\n  <div class=\"dialog-body\">\n    <div class=\"form-row\" style=\"flex-direction:column\">\n      <div><label>保存 (Ctrl+S)</label><input type=\"text\" id=\"shortcutSave\" placeholder=\"Ctrl+S\"></div>\n      <div><label>打印 (Ctrl+P)</label><input type=\"text\" id=\"shortcutPrint\" placeholder=\"Ctrl+P\"></div>\n      <div><label>查找 (Ctrl+F)</label><input type=\"text\" id=\"shortcutFind\" placeholder=\"Ctrl+F\"></div>\n      <div><label>粗体 (Ctrl+B)</label><input type=\"text\" id=\"shortcutBold\" placeholder=\"Ctrl+B\"></div>\n      <div><label>斜体 (Ctrl+I)</label><input type=\"text\" id=\"shortcutItalic\" placeholder=\"Ctrl+I\"></div>\n      <div><label>底线 (Ctrl+U)</label><input type=\"text\" id=\"shortcutUnderline\" placeholder=\"Ctrl+U\"></div>\n    </div>\n  </div>\n  <div class=\"dialog-footer\"><button onclick=\"closeDialog()\">取消</button><button class=\"primary\" onclick=\"applyShortcuts()\">应用</button></div>\n</div>\n\n<script>\n// ===================== STATE & SETTINGS =====================\nvar pageSetup = { width: 210, height: 297, marginTop: 25, marginBottom: 25, marginLeft: 25, marginRight: 25, orientation: 'portrait' };\nvar zoom = 100;\nvar showRuler = true;\nvar showGrid = false;\nvar activeColorMode = 'fore';\nvar currentFile = '';\nvar fileMode = 'edit';\nvar pdfBlobUrl = '';\nvar trackChanges = false;\nvar nightMode = false;\nvar formatPainterActive = false;\nvar formatPainterStyle = null;\nvar footnoteCounter = 0;\nvar autoSaveInterval = null;\nvar shortcutMap = {\n  'Ctrl+S': 'save',\n  'Ctrl+P': 'print',\n  'Ctrl+F': 'find',\n  'Ctrl+B': 'bold',\n  'Ctrl+I': 'italic',\n  'Ctrl+U': 'underline'\n};\n\nvar COLORS = [\n  '#000000','#434343','#666666','#999999','#b7b7b7','#cccccc','#d9d9d9','#efefef','#f3f3f3','#ffffff',\n  '#980000','#ff0000','#ff9900','#ffff00','#00ff00','#00ffff','#4a86e8','#0000ff','#9900ff','#ff00ff',\n  '#e6b8af','#f4cccc','#fce5cd','#fff2cc','#d9ead3','#d0e0e3','#c9daf8','#cfe2f3','#d9d2e9','#ead1dc',\n  '#dd7e6b','#ea9999','#f9cb9c','#ffe599','#b6d7a8','#a2c4c9','#a4c2f4','#9fc5e8','#b4a7d6','#d5a6bd',\n  '#cc4125','#e06666','#f6b26b','#ffd966','#93c47d','#76a5af','#6d9eeb','#6fa8dc','#8e7cc3','#c27ba0',\n  '#a61c00','#cc0000','#e69138','#f1c232','#6aa84f','#45818e','#3c78d8','#3d85c6','#674ea7','#a64d79',\n  '#85200c','#990000','#b45f06','#bf9000','#38761d','#134f5c','#1155cc','#0b5394','#351c75','#741b47',\n  '#5b0f00','#660000','#783f04','#7f6000','#274e13','#0c343d','#1c4587','#073763','#20124d','#4c1130'\n];\nvar HL_COLORS = ['transparent','#ffff00','#00ff00','#00ffff','#ff00ff','#ff0000','#0000ff','#ffc000','#c0c0c0'];\n\n// ===================== INIT =====================\ndocument.addEventListener('DOMContentLoaded', function() {\n  var editor = document.getElementById('editor');\n  editor.focus();\n  buildColorGrid();\n  updatePage();\n  updateRulers();\n  updateWordCount();\n  startAutoSave();\n\n  editor.addEventListener('input', function() { updateWordCount(); updateToolbar(); saveToDraft(); });\n  editor.addEventListener('mouseup', updateToolbar);\n  editor.addEventListener('keyup', updateToolbar);\n  editor.addEventListener('click', updateToolbar);\n  editor.addEventListener('keydown', handleKeyDown);\n  editor.addEventListener('paste', handlePaste);\n\n  document.addEventListener('selectionchange', updateToolbar);\n  document.addEventListener('click', function(e) {\n    if (!e.target.closest('.menu-btn') && !e.target.closest('.menu-dropdown')) {\n      closeMenus();\n    }\n    if (!e.target.closest('#colorPopup') && !e.target.closest('#fontColorBtn') && !e.target.closest('#hiliteBtn')) {\n      document.getElementById('colorPopup').classList.remove('show');\n    }\n  });\n  recoverDraft();\n});\n\nfunction buildColorGrid() {\n  var g = document.getElementById('colorGrid');\n  COLORS.forEach(function(c) {\n    var d = document.createElement('div');\n    d.className = 'color-cell';\n    d.style.background = c;\n    d.onclick = function() { applyColor(c); };\n    g.appendChild(d);\n  });\n}\n\n// ===================== EDITOR CORE =====================\nfunction execCmd(cmd, val) {\n  document.execCommand(cmd, false, val);\n  document.getElementById('editor').focus();\n  updateToolbar();\n  updateWordCount();\n}\n\nfunction changeFontSize(pt) {\n  var map = { '8':'1','9':'1','10':'2','10.5':'2','11':'2','12':'3','14':'4','16':'4','18':'5','20':'5','22':'5','24':'6','28':'6','32':'6','36':'7','48':'7','72':'7' };\n  execCmd('fontSize', map[pt] || '3');\n}\n\nfunction applyHeading(tag) {\n  execCmd('formatBlock', '<' + tag + '>');\n}\n\nfunction updateToolbar() {\n  document.getElementById('btnBold').classList.toggle('active', document.queryCommandState('bold'));\n  document.getElementById('btnItalic').classList.toggle('active', document.queryCommandState('italic'));\n  document.getElementById('btnUnderline').classList.toggle('active', document.queryCommandState('underline'));\n  document.getElementById('btnStrike').classList.toggle('active', document.queryCommandState('strikeThrough'));\n  document.getElementById('btnSuper').classList.toggle('active', document.queryCommandState('superscript'));\n  document.getElementById('btnSub').classList.toggle('active', document.queryCommandState('subscript'));\n  ['Left','Center','Right','Justify'].forEach(function(a) {\n    document.getElementById('btn'+a).classList.toggle('active', document.queryCommandState('justify'+a));\n  });\n\n  var f = document.queryCommandValue('fontName') || 'Arial';\n  var selFont = document.getElementById('fontSelect');\n  for (var i = 0; i < selFont.options.length; i++) {\n    if (f.indexOf(selFont.options[i].value) >= 0) { selFont.value = selFont.options[i].value; break; }\n  }\n\n  var c = document.queryCommandValue('foreColor');\n  if (c) {\n    var m = c.match(/\\d+/g);\n    if (m) document.getElementById('foreSwatch').style.background = '#' + m.map(function(x){return parseInt(x).toString(16).padStart(2,'0')}).join('');\n  }\n}\n\nfunction handleKeyDown(e) {\n  if (e.key === 'Tab') { e.preventDefault(); execCmd('insertHTML', '&nbsp;&nbsp;&nbsp;&nbsp;'); }\n  if (e.ctrlKey || e.metaKey) {\n    var combo = 'Ctrl+' + e.key.toUpperCase();\n    if (shortcutMap[combo] === 'save') { e.preventDefault(); exportPdf(); }\n    else if (shortcutMap[combo] === 'print') { e.preventDefault(); printDoc(); }\n    else if (shortcutMap[combo] === 'find') { e.preventDefault(); toggleFindBar(); }\n    else if (shortcutMap[combo] === 'bold') { e.preventDefault(); execCmd('bold'); }\n    else if (shortcutMap[combo] === 'italic') { e.preventDefault(); execCmd('italic'); }\n    else if (shortcutMap[combo] === 'underline') { e.preventDefault(); execCmd('underline'); }\n    else if (e.key === 'k' || e.key === 'K') { e.preventDefault(); showInsertLink(); }\n    else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); exec('new'); }\n    else if (e.key === 'o' || e.key === 'O') { e.preventDefault(); openFile(); }\n    else if (e.key === 'Enter') { insertPageBreak(); }\n  }\n  setTimeout(updateToolbar, 10);\n}\n\nfunction handlePaste(e) {\n  e.preventDefault();\n  var html = e.clipboardData.getData('text/html');\n  var text = e.clipboardData.getData('text/plain');\n  if (html) execCmd('insertHTML', html);\n  else execCmd('insertHTML', text.split('\\n').map(function(l) { return '<p>' + (l || '<br>') + '</p>'; }).join(''));\n}\n\n// ===================== FEATURE 1: FORMAT PAINTER =====================\nfunction toggleFormatPainter() {\n  formatPainterActive = !formatPainterActive;\n  var btn = document.getElementById('formatPainterBtn');\n  if (formatPainterActive) {\n    btn.classList.add('active');\n    captureFormatPainterStyle();\n  } else {\n    btn.classList.remove('active');\n    formatPainterStyle = null;\n  }\n}\nfunction captureFormatPainterStyle() {\n  var sel = window.getSelection();\n  if (sel.rangeCount === 0) return;\n  var range = sel.getRangeAt(0);\n  var container = range.commonAncestorContainer;\n  if (container.nodeType === Node.TEXT_NODE) container = container.parentNode;\n  formatPainterStyle = {\n    fontFamily: document.queryCommandValue('fontName'),\n    fontSize: getComputedStyle(container).fontSize,\n    fontWeight: document.queryCommandState('bold') ? 'bold' : 'normal',\n    fontStyle: document.queryCommandState('italic') ? 'italic' : 'normal',\n    textDecoration: (document.queryCommandState('underline') ? 'underline ' : '') + (document.queryCommandState('strikeThrough') ? 'line-through' : ''),\n    color: document.queryCommandValue('foreColor'),\n    backgroundColor: document.queryCommandValue('backColor')\n  };\n}\ndocument.addEventListener('mouseup', function(e) {\n  if (formatPainterActive && formatPainterStyle) {\n    var sel = window.getSelection();\n    if (sel.rangeCount > 0 && !sel.isCollapsed) {\n      applyFormatPainterStyle(sel.getRangeAt(0));\n    }\n  }\n});\nfunction applyFormatPainterStyle(range) {\n  var contents = range.extractContents();\n  var span = document.createElement('span');\n  var style = formatPainterStyle;\n  span.style.fontFamily = style.fontFamily;\n  span.style.fontSize = style.fontSize;\n  span.style.fontWeight = style.fontWeight;\n  span.style.fontStyle = style.fontStyle;\n  span.style.textDecoration = style.textDecoration;\n  span.style.color = style.color;\n  span.style.backgroundColor = style.backgroundColor === 'rgba(0, 0, 0, 0)' ? 'transparent' : style.backgroundColor;\n  span.appendChild(contents);\n  range.insertNode(span);\n  formatPainterActive = false;\n  document.getElementById('formatPainterBtn').classList.remove('active');\n}\n\n// ===================== FEATURE 2: LINE SPACING =====================\nfunction setLineSpacing(spacing) {\n  var sel = window.getSelection();\n  if (!sel.rangeCount) return;\n  var range = sel.getRangeAt(0);\n  var block = getBlockElement(range.startContainer);\n  if (block) block.style.lineHeight = spacing;\n  document.getElementById('lineSpacingSelect').value = spacing;\n}\nfunction getBlockElement(node) {\n  while (node && node.nodeType !== Node.ELEMENT_NODE) node = node.parentNode;\n  while (node && !['P','H1','H2','H3','DIV','LI','BLOCKQUOTE'].includes(node.tagName) && node !== document.getElementById('editor'))\n    node = node.parentElement;\n  return node && node !== document.getElementById('editor') ? node : null;\n}\n\n// ===================== FEATURE 3: FIRST LINE INDENT =====================\nfunction setFirstLineIndent() {\n  var sel = window.getSelection();\n  if (!sel.rangeCount) return;\n  var range = sel.getRangeAt(0);\n  var block = getBlockElement(range.startContainer);\n  if (block) block.style.textIndent = '2em';\n}\n\n// ===================== FEATURE 4: PAGE BREAK =====================\nfunction insertPageBreak() {\n  execCmd('insertHTML', '<div class=\"page-break\" contenteditable=\"false\">--- 分页符 ---</div><p><br></p>');\n}\n\n// ===================== FEATURE 5: HEADER & FOOTER =====================\nfunction insertHeaderFooter(type) {\n  var className = type === 'header' ? 'header-content' : 'footer-content';\n  var html = '<div class=\"' + type + '-area\" contenteditable=\"true\"><div class=\"' + className + '\">[在此输入' + (type==='header'?'页眉':'页脚') + ']</div></div>';\n  var ed = document.getElementById('editor');\n  if (type === 'header') {\n    ed.insertAdjacentHTML('afterbegin', html);\n  } else {\n    ed.insertAdjacentHTML('beforeend', html);\n  }\n}\n\n// ===================== FEATURE 6: TABLE CONTEXT MENU =====================\ndocument.addEventListener('contextmenu', function(e) {\n  var target = e.target.closest('td,th');\n  if (target) {\n    e.preventDefault();\n    showTableContextMenu(target, e.clientX, e.clientY);\n  }\n});\nfunction showTableContextMenu(cell, x, y) {\n  var menu = document.createElement('div');\n  menu.className = 'popup show';\n  menu.style.position = 'fixed';\n  menu.style.left = x + 'px';\n  menu.style.top = y + 'px';\n  menu.innerHTML = `\n    <button onclick=\"execCmd('insertHTML','<br>')\">合并单元格</button>\n    <button onclick=\"execCmd('insertHTML','<br>')\">拆分单元格</button>\n    <button onclick=\"execCmd('insertHTML','<br>')\">在上方插入行</button>\n    <button onclick=\"execCmd('insertHTML','<br>')\">在下方插入行</button>\n    <button onclick=\"execCmd('insertHTML','<br>')\">在左侧插入列</button>\n    <button onclick=\"execCmd('insertHTML','<br>')\">在右侧插入列</button>\n  `;\n  document.body.appendChild(menu);\n  menu.onclick = function(e2) { e2.stopPropagation(); };\n  document.addEventListener('click', function rem() { menu.remove(); document.removeEventListener('click', rem); }, {once:true});\n}\n\n// ===================== FEATURE 7: IMAGE RESIZE =====================\ndocument.addEventListener('click', function(e) {\n  if (e.target.tagName === 'IMG') {\n    e.target.style.outline = '2px solid #0078d7';\n    e.target.setAttribute('data-resizable', 'true');\n  } else {\n    document.querySelectorAll('img[data-resizable]').forEach(function(img) { img.style.outline = ''; });\n  }\n});\ndocument.addEventListener('wheel', function(e) {\n  if (e.target.tagName === 'IMG' && e.ctrlKey) {\n    e.preventDefault();\n    var img = e.target;\n    var scale = e.deltaY < 0 ? 1.1 : 0.9;\n    img.style.width = (img.offsetWidth * scale) + 'px';\n    img.style.height = 'auto';\n  }\n});\n\n// ===================== FEATURE 8: SPELL CHECK SUGGESTIONS =====================\ndocument.addEventListener('contextmenu', function(e) {\n  var sel = window.getSelection();\n  if (sel.rangeCount === 0 || sel.isCollapsed) return;\n  var text = sel.toString().trim();\n  if (text && text.length < 30 && /[a-zA-Z]/.test(text)) {\n    e.preventDefault();\n    showSpellSuggestions(text, e.clientX, e.clientY);\n  }\n});\nfunction showSpellSuggestions(word, x, y) {\n  var menu = document.createElement('div');\n  menu.className = 'popup show';\n  menu.style.position = 'fixed';\n  menu.style.left = x + 'px';\n  menu.style.top = y + 'px';\n  menu.innerHTML = '<div style=\"padding:4px;font-size:12px\">拼写建议：</div>';\n  var suggestions = [word + 'e', word + 'ing', word + 'ed'];\n  suggestions.forEach(function(s) {\n    var item = document.createElement('div');\n    item.className = 'menu-item';\n    item.textContent = s;\n    item.onclick = function() {\n      execCmd('insertText', s);\n      menu.remove();\n    };\n    menu.appendChild(item);\n  });\n  document.body.appendChild(menu);\n  document.addEventListener('click', function rem() { menu.remove(); document.removeEventListener('click', rem); }, {once:true});\n}\n\n// ===================== FEATURE 9: STYLE PRESETS =====================\nfunction applyStylePreset(preset) {\n  var styles = {\n    formal: { h1: '22pt bold #1a1a1a', h2: '16pt bold #333', h3: '13pt bold #555', p: '12pt #000' },\n    simple: { h1: '20pt normal #000', h2: '15pt normal #222', h3: '13pt normal #444', p: '11pt #333' },\n    colorful: { h1: '24pt bold #0078d7', h2: '18pt bold #e81123', h3: '14pt bold #10893e', p: '12pt #333' }\n  };\n  var s = styles[preset];\n  if (!s) return;\n  var ed = document.getElementById('editor');\n  ['h1','h2','h3','p'].forEach(function(tag) {\n    var elems = ed.querySelectorAll(tag);\n    elems.forEach(function(el) {\n      var parts = s[tag].split(' ');\n      el.style.fontSize = parts[0];\n      el.style.fontWeight = parts[1] === 'bold' ? 'bold' : 'normal';\n      el.style.color = parts[2] || '';\n    });\n  });\n}\n\n// ===================== FEATURE 10: AUTO SAVE & DRAFT RECOVERY =====================\nfunction startAutoSave() {\n  if (autoSaveInterval) clearInterval(autoSaveInterval);\n  autoSaveInterval = setInterval(saveToDraft, 30000);\n}\nfunction saveToDraft() {\n  var ed = document.getElementById('editor');\n  localStorage.setItem('docDraft', JSON.stringify({ html: ed.innerHTML, pageSetup: pageSetup, zoom: zoom }));\n}\nfunction recoverDraft() { localStorage.removeItem('docDraft'); }\n\n// ===================== FEATURE 11: FOOTNOTES =====================\nfunction insertFootnote() {\n  footnoteCounter++;\n  var ref = '<sup class=\"footnote-ref\" contenteditable=\"false\" data-footnote=\"' + footnoteCounter + '\">' + footnoteCounter + '</sup>';\n  execCmd('insertHTML', ref);\n  var ed = document.getElementById('editor');\n  var area = ed.querySelector('.footnote-area');\n  if (!area) {\n    area = document.createElement('div');\n    area.className = 'footnote-area';\n    area.contentEditable = 'true';\n    ed.appendChild(area);\n  }\n  var item = document.createElement('div');\n  item.className = 'footnote-item';\n  item.innerHTML = '<sup>' + footnoteCounter + '</sup> ';\n  item.setAttribute('data-footnote', footnoteCounter);\n  area.appendChild(item);\n}\n\n// ===================== FEATURE 12: MULTILEVEL LIST =====================\nfunction promoteListLevel() { execCmd('outdent'); }\nfunction demoteListLevel() { execCmd('indent'); }\n\n// ===================== FEATURE 13: TABLE OF CONTENTS =====================\nfunction insertTOC() {\n  var ed = document.getElementById('editor');\n  var headings = ed.querySelectorAll('h1,h2,h3');\n  if (headings.length === 0) { alert('文档中没有标题，无法生成目录。'); return; }\n  var toc = '<div class=\"toc\" contenteditable=\"false\"><h2>目录</h2><ul>';\n  var currentLevel = 0;\n  headings.forEach(function(h) {\n    var level = parseInt(h.tagName.substring(1));\n    var text = h.textContent;\n    var indent = level - 1;\n    if (level > currentLevel) { toc += '<ul>'; }\n    else if (level < currentLevel) { toc += '</ul>'.repeat(currentLevel - level); }\n    toc += '<li><a href=\"#' + text.replace(/\\s+/g,'_') + '\">' + text + '</a></li>';\n    currentLevel = level;\n  });\n  toc += '</ul></div>';\n  execCmd('insertHTML', toc);\n}\n\n// ===================== FEATURE 14: TRACK CHANGES =====================\nfunction toggleTrackChanges() {\n  trackChanges = !trackChanges;\n  alert('修订模式' + (trackChanges ? '开启' : '关闭') + '（模拟）');\n  if (trackChanges) {\n    document.getElementById('editor').style.border = '2px solid #e81123';\n  } else {\n    document.getElementById('editor').style.border = '';\n  }\n}\n\n// ===================== FEATURE 15: NIGHT MODE =====================\nfunction toggleNightMode() {\n  nightMode = !nightMode;\n  document.body.classList.toggle('night-mode', nightMode);\n}\n\n// ===================== FEATURE 16: DOCUMENT COMPARISON =====================\nfunction compareDocuments() {\n  var html1 = document.getElementById('editor').innerHTML;\n  var html2 = prompt('请粘贴要比较的文档 HTML 内容：');\n  if (!html2) return;\n  var win = window.open('', '_blank');\n  win.document.write('<pre>' + html1 + '\\n\\n--- DIFF ---\\n\\n' + html2 + '</pre>');\n}\n\n// ===================== FEATURE 17: CUSTOM SHORTCUTS =====================\nfunction showShortcutDialog() {\n  openDialog('shortcutDlg');\n  document.getElementById('shortcutSave').value = 'Ctrl+S';\n  document.getElementById('shortcutPrint').value = 'Ctrl+P';\n  document.getElementById('shortcutFind').value = 'Ctrl+F';\n  document.getElementById('shortcutBold').value = 'Ctrl+B';\n  document.getElementById('shortcutItalic').value = 'Ctrl+I';\n  document.getElementById('shortcutUnderline').value = 'Ctrl+U';\n}\nfunction applyShortcuts() {\n  shortcutMap['Ctrl+S'] = document.getElementById('shortcutSave').value;\n  shortcutMap['Ctrl+P'] = document.getElementById('shortcutPrint').value;\n  shortcutMap['Ctrl+F'] = document.getElementById('shortcutFind').value;\n  shortcutMap['Ctrl+B'] = document.getElementById('shortcutBold').value;\n  shortcutMap['Ctrl+I'] = document.getElementById('shortcutItalic').value;\n  shortcutMap['Ctrl+U'] = document.getElementById('shortcutUnderline').value;\n  closeDialog();\n  alert('快捷键已更新。');\n}\n\n// ===================== FIXED WORD COUNT =====================\nfunction updateWordCount() {\n  var ed = document.getElementById('editor');\n  setTimeout(function() {\n    var text = (ed.textContent || '').trim();\n    if (!text) {\n      document.getElementById('wcWords').textContent = '0 字';\n      document.getElementById('wc2').textContent = '0';\n      document.getElementById('wc3').textContent = '0';\n      document.getElementById('wc4').textContent = '0';\n      document.getElementById('wc5').textContent = '0';\n      document.getElementById('wc6').textContent = '0';\n      return;\n    }\n    // 中文逐字计数（含中文标点）\n    var chineseChars = (text.match(/[\\u4e00-\\u9fff\\u3000-\\u303f\\uff00-\\uffef]/g) || []).length;\n    // 英文逐词计数（去中文后按空白分割）\n    var nonChinese = text.replace(/[\\u4e00-\\u9fff\\u3000-\\u303f\\uff00-\\uffef]/g, ' ');\n    var englishWords = nonChinese.split(/\\s+/).filter(function(w) { return w.length > 0; }).length;\n    var totalWords = chineseChars + englishWords;\n    var charsNoSpace = text.replace(/\\s/g, '').length;\n    var charsWithSpace = text.length;\n    var paras = ed.querySelectorAll('p, div, h1, h2, h3, li').length || 1;\n    var lines = text.split('\\n').length;\n    document.getElementById('wcWords').textContent = totalWords + ' 字';\n    document.getElementById('wc2').textContent = totalWords;\n    document.getElementById('wc3').textContent = charsNoSpace;\n    document.getElementById('wc4').textContent = charsWithSpace;\n    document.getElementById('wc5').textContent = paras;\n    document.getElementById('wc6').textContent = lines;\n  }, 0);\n}\nfunction showWordCount() { openDialog('wordCountDlg'); updateWordCount(); }\n\n// ===================== PAGE & RULER =====================\nfunction updatePage() {\n  var mm = zoom / 100;\n  var pw = pageSetup.width * 3.779527559 * mm;\n  var ph = pageSetup.height * 3.779527559 * mm;\n  var mt = pageSetup.marginTop * 3.779527559 * mm;\n  var mb = pageSetup.marginBottom * 3.779527559 * mm;\n  var ml = pageSetup.marginLeft * 3.779527559 * mm;\n  var mr = pageSetup.marginRight * 3.779527559 * mm;\n\n  var page = document.getElementById('page');\n  page.style.width = pw + 'px';\n  page.style.minHeight = ph + 'px';\n\n  var ed = document.getElementById('editor');\n  ed.style.paddingTop = mt + 'px';\n  ed.style.paddingBottom = mb + 'px';\n  ed.style.paddingLeft = ml + 'px';\n  ed.style.paddingRight = mr + 'px';\n\n  document.getElementById('zoomLabel').textContent = zoom + '%';\n  document.getElementById('statusZoom').textContent = zoom + '%';\n  document.getElementById('statusSize').textContent = pageSetup.width + 'x' + pageSetup.height;\n}\n\nfunction updateRulers() {\n  var mm = zoom / 100;\n  var pw = pageSetup.width * 3.779527559 * mm;\n  var ph = pageSetup.height * 3.779527559 * mm;\n  var ml = pageSetup.marginLeft * 3.779527559 * mm;\n  var mr = pageSetup.marginRight * 3.779527559 * mm;\n  var mt = pageSetup.marginTop * 3.779527559 * mm;\n  var mb = pageSetup.marginBottom * 3.779527559 * mm;\n\n  var hInner = document.getElementById('hRulerInner');\n  hInner.style.width = pw + 'px';\n  hInner.innerHTML = '';\n  var lm = document.createElement('div'); lm.className = 'margin-zone'; lm.style.left = '0'; lm.style.width = ml + 'px'; hInner.appendChild(lm);\n  var rm = document.createElement('div'); rm.className = 'margin-zone'; rm.style.right = '0'; rm.style.width = mr + 'px'; hInner.appendChild(rm);\n  for (var i = 0; i <= pageSetup.width; i++) {\n    var pos = i * 3.779527559 * mm;\n    var t = document.createElement('div'); t.className = 'tick'; t.style.left = pos + 'px';\n    t.style.height = (i % 10 === 0) ? '12px' : (i % 5 === 0) ? '8px' : '5px';\n    hInner.appendChild(t);\n    if (i % 10 === 0) { var n = document.createElement('span'); n.className = 'tick-num'; n.style.left = pos + 'px'; n.textContent = utput.subarray(0, outPos);\n}\nfunction bytesToString(bytes) {\n  var s = '';\n  for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);\n  return s;\n}\nfunction docxXmlToHtml(xmlStr, files) {\n  var parser = new DOMParser();\n  var xmlDoc = parser.parseFromString(xmlStr, 'text/xml');\n  function ns(tag) { return xmlDoc.getElementsByTagName(tag); }\n  function nsW(tag) { return xmlDoc.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', tag); }\n  var paragraphs = nsW('p');\n  if (paragraphs.length === 0) paragraphs = ns('w:p');\n  var html = '';\n  for (var pi = 0; pi < paragraphs.length; pi++) {\n    var p = paragraphs[pi];\n    var pPr = p.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'pPr')[0] || p.getElementsByTagName('w:pPr')[0];\n    var pStyle = '';\n    var tag = 'p';\n    if (pPr) {\n      var pStyle2 = pPr.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'pStyle')[0] || pPr.getElementsByTagName('w:pStyle')[0];\n      if (pStyle2) {\n        var val = pStyle2.getAttribute('w:val') || '';\n        if (val.indexOf('Heading1') >= 0 || val === '1') tag = 'h1';\n        else if (val.indexOf('Heading2') >= 0 || val === '2') tag = 'h2';\n        else if (val.indexOf('Heading3') >= 0 || val === '3') tag = 'h3';\n      }\n      var jc = pPr.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'jc')[0] || pPr.getElementsByTagName('w:jc')[0];\n      if (jc) {\n        var jv = jc.getAttribute('w:val');\n        if (jv === 'center') pStyle = ' style=\"text-align:center\"';\n        else if (jv === 'right') pStyle = ' style=\"text-align:right\"';\n        else if (jv === 'both') pStyle = ' style=\"text-align:justify\"';\n      }\n    }\n    html += '<' + tag + pStyle + '>';\n    var runs = p.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'r');\n    if (runs.length = function openInWordEditor(content, floatBar, item, textContent, docxBase64) {
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;background:#e8e8e8;';

  let editorHtml = WORD_EDITOR_HTML;

  if (docxBase64) {
    // DOCX: inject script to parse base64 data after DOM ready
    const docxScript = '<script>' +
      'window.addEventListener("DOMContentLoaded", function() {' +
        'try {' +
          'var binary = atob(docxBase64);' +
          'var bytes = new Uint8Array(binary.length);' +
          'for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);' +
          'parseDocx(bytes.buffer, function(html) {' +
            'var editor = document.getElementById("editor");' +
            'if (editor) { editor.innerHTML = html || "<p><br></p>"; updateWordCount(); }' +
          '});' +
        '} catch(e) { console.error("DOCX load error:", e); }' +
      '});' +
    '<\/script>';
    editorHtml = editorHtml.replace('</body>', docxScript.replace(/docxBase64/g, "'" + docxBase64 + "'") + '</body>');
  } else if (textContent !== null && textContent !== undefined) {
    // TXT: inject text content directly
    const htmlContent = escapeHtml(textContent).split('\n').map(function(l) { return '<p>' + l + '</p>'; }).join('');
    editorHtml = editorHtml.replace(
      '<div id="editor" contenteditable="true" spellcheck="true"><p><br></p></div>',
      '<div id="editor" contenteditable="true" spellcheck="true">' + htmlContent + '</div>'
    );
  }

  iframe.srcdoc = editorHtml;
  content.insertBefore(iframe, floatBar);

  // Save button: read content from iframe and save back to item
  floatBar.querySelector('.save-btn').onclick = function() {
    try {
      const editorDoc = iframe.contentDocument || iframe.contentWindow.document;
      const editor = editorDoc.getElementById('editor');
      if (editor) {
        item.content = new TextEncoder().encode(editor.innerText);
        item.size = item.content.length;
        item.time = Date.now();
        thumbCache.delete(item.id);
        showToast('已保存');
        render();
      }
    } catch(e) { showToast('保存失敗: ' + e.message, true); }
  };

  // Cancel button: restore original content
  floatBar.querySelector('.cancel-btn').onclick = function() {
    try {
      const editorDoc = iframe.contentDocument || iframe.contentWindow.document;
      const editor = editorDoc.getElementById('editor');
      if (editor) {
        if (textContent !== null && textContent !== undefined) {
          const htmlContent = escapeHtml(textContent).split('\n').map(function(l) { return '<p>' + l + '</p>'; }).join('');
          editor.innerHTML = htmlContent;
        } else if (docxBase64) {
          var binary = atob(docxBase64);
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          if (iframe.contentWindow.parseDocx) {
            iframe.contentWindow.parseDocx(bytes.buffer, function(html) {
              editor.innerHTML = html || '<p><br></p>';
            });
          }
        }
      }
    } catch(e) { showToast('恢復失敗: ' + e.message, true); }
  };

  floatBar.style.display = 'flex';
}

  function relocateItem(item,targetPid){

  function moveFolderRecursive(fid,targetPid){

      else{const nn=getUniqueName(c.name,folder.id,'file',c.id);if(nn!==c.name)showToast(`子項更名「${nn}」`);c.name=nn;c.pid=folder.id;c.time=Date.now();}

  function deepCopy(srcId,targetPid){
    const src=db.find(x=>x.id===srcId);if(!src||src.del)return false;

  async function generateThumb(fileItem){
    if(!fileItem.content||fileItem.content.length===0)return null;
    const ext=fileItem.name.split('.').pop().toLowerCase();
    const blob=new Blob([fileItem.content], {type: getMimeType(ext)});
    const maxW=1200,maxH=900,quality=0.95;
    if(IMG.has(ext)){
      return new Promise(res=>{
        const img=new Image();const url=URL.createObjectURL(blob);
        img.onload=()=>{const cvs=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=(maxW/w)*h;w=maxW;}if(h>maxH){w=(maxH/h)*w;h=maxH;}cvs.width=w;cvs.height=h;cvs.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);res(cvs.toDataURL('image/jpeg',quality));};
        img.onerror=()=>{URL.revokeObjectURL(url);res(null);};
        img.src=url;
      });
    }
    if(VID.has(ext)){
      return new Promise(res=>{
        const video=document.createElement('video');
        video.preload='metadata';video.muted=true;video.playsInline=true;
        const url=URL.createObjectURL(blob);video.src=url;
        const cleanup = () => { URL.revokeObjectURL(url); };
        let resolved=false;
        const finish=(result)=>{if(resolved)return;resolved=true;cleanup();res(result);};
        let timeout = setTimeout(()=>finish(null), 6000);
        const captureFrame = () => {
          if(timeout)clearTimeout(timeout);
          try{
            const vw=video.videoWidth,vh=video.videoHeight;
            if(!vw||!vh){finish(null);return;}
            const cvs=document.createElement('canvas');
            let w=vw,h=vh;if(w>maxW){h=(maxW/w)*h;w=maxW;}if(h>maxH){w=(maxH/h)*w;h=maxH;}
            cvs.width=w;cvs.height=h;
            cvs.getContext('2d').drawImage(video,0,0,w,h);
            finish(cvs.toDataURL('image/jpeg',quality));
          }catch(e){finish(null);}
        };
        video.addEventListener('loadedmetadata',()=>{if(video.readyState>=1)video.currentTime=0.1;});
        video.addEventListener('seeked',captureFrame,{once:true});
        video.addEventListener('error',()=>{if(timeout)clearTimeout(timeout);finish(null);});
      });
    }
    if(ext==='pdf')return'pdf:'+URL.createObjectURL(blob);
    if(TXT.has(ext)){
      try{
        const text=new TextDecoder('utf-8',{fatal:false}).decode(fileItem.content);
        const lines=text.split('\n').slice(0,4).join('\n').substring(0,200);
        const cvs=document.createElement('canvas');cvs.width=maxW;cvs.height=maxH;const ctx=cvs.getContext('2d');

        split.forEach((l,i)=>ctx.fillText(l.substring(0,40),maxW/2,startY+i*lineH));
        return cvs.toDataURL('image/png');
      }catch{return null;}
    }
    return null;
  }

  function clampWindowPos(win, w, h) {
    const maxW = window.innerWidth - 40;
    const maxH = window.innerHeight - 80;
    let nw = Math.min(w, maxW);
    let nh = Math.min(h, maxH);
    let left = Math.max(20, (window.innerWidth - nw) / 2);

  function sizeWindowToMedia(win, mediaW, mediaH, maxRatio = 0.8) {
    if (!win || win.classList.contains('maximized')) return;
    const headerH = 45;
    const padding = 24;
    const availW = window.innerWidth * maxRatio;
    const availH = window.innerHeight * maxRatio;
    let w = mediaW + padding;
    let h = mediaH + headerH + padding;
    const ratio = Math.min(availW / w, availH / h, 1);
    w = Math.max(300, Math.round(w * ratio));
    h = Math.max(200, Math.round(h * ratio));
    const clamped = clampWindowPos(win, w, h);
    win.style.width = clamped.width + 'px';
    win.style.height = clamped.height + 'px';
    win.style.left = clamped.left + 'px';
    win.style.top = clamped.top + 'px';

  function loadPreviewContent(item,win,content,floatBar, state){

      const v=document.createElement('video');v.controls=true;v.style.maxWidth='100%';v.style.maxHeight='100%';v.setAttribute('playsinline','');v.setAttribute('webkit-playsinline','');v.preload='auto';

        const vw=v.videoWidth,vh=v.videoHeight;
        if(vw&&vh){

          function getPos(e){const rect=cvs.getBoundingClientRect();return{x:(e.clientX-rect.left)*(cvs.width/rect.width),y:(e.clientY-rect.top)*(cvs.height/rect.height)};}
          function startPaint(e){painting=true;const p=getPos(e.touches?e.touches[0]:e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();}
          function movePaint(e){if(!painting)return;e.preventDefault();const p=getPos(e.touches?e.touches[0]:e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='red';ctx.lineWidth=2;ctx.stroke();}
          function endPaint(){painting=false;}
          cvs.addEventListener('pointerdown',startPaint);cvs.addEventListener('pointermove',movePaint);cvs.addEventListener('pointerup',endPaint);
          cvs.addEventListener('touchstart',startPaint,{passive:false});cvs.addEventListener('touchmove',movePaint,{passive:false});cvs.addEventListener('touchend',endPaint);
        }
      }else{
        const pre=content.querySelector('pre');
        if(pre){const ta=document.createElement('textarea');ta.value=pre.textContent;content.insertBefore(ta,floatBar);pre.style.display='none';}
      }
      floatBar.querySelector('.save-btn').onclick=()=>{
        if(item.name.split('.').pop().match(/^(jpg|jpeg|png|gif|bmp|webp)$/i)){
          const cvs=content.querySelector('canvas');if(cvs)cvs.toBlob(bl=>{const r=new FileReader();r.onload=()=>{item.content=new Uint8Array(r.result);item.size=item.content.length;item.time=Date.now();thumbCache.delete(item.id);showToast('已保存');render();};r.readAsArrayBuffer(bl);},'image/png');
        }else{
          const ta=content.querySelector('textarea');if(ta){item.content=new TextEncoder().encode(ta.value);item.size=item.content.length;item.time=Date.now();thumbCache.delete(item.id);showToast('已保存');render();}
        }
        floatBar.style.display='none';editBtn.style.display='inline-flex';editing=false;
        const pre=content.querySelector('pre'),img=content.querySelector('img'),cvs=content.querySelector('canvas');
        if(pre)pre.style.display='';if(img)img.style.display='';if(cvs)cvs.remove();content.querySelector('textarea')?.remove();
      };
      floatBar.querySelector('.cancel-btn').onclick=()=>{

        const pre=content.querySelector('pre'),img=content.querySelector('img'),cvs=content.querySelector('canvas');

      };
    });
  }

    const rootIds=getTopIds(valid);
    if(clip.mode==='move'){
      for(let id of rootIds){const item=db.find(x=>x.id===id);if(item&&item.type==='dir'&&isDescendant(id,targetPid)){showToast('無法移動：目標為來源的子資料夾');return;}}

    const recentItems=db.filter(x=>!x.del).sort((a,b)=>b.time-a.time).slice(0,5);
    let html=`<div class="home-container"><h2 style="font-size:24px;font-weight:600;margin-bottom:4px">${greet()}，${escapeHtml(userName)}</h2><p style="color:var(--sub);margin-bottom:20px">欢迎回来</p>
      <div class="home-grid" style="margin-bottom:20px"><div class="home-card"><div class="home-card-header"><div class="home-card-icon" style="background:var(--accent-light)">${makeSvgCalendar()}</div><div><div class="home-card-title">签到积分</div><div class="home-card-sub">${day} / ${month}</div></div></div><div style="font-size:28px;font-weight:700">${userPoints} <span style="font-size:14px;color:var(--sub)">积分</span></div><button id="doSignBtn" class="t-btn primary" style="width:100%" ${signedToday?'disabled':''}>${signedToday?'今日已签到':'立即签到'}</button></div></div>
      <h3 style="font-size:18px;font-weight:600;margin-bottom:12px">文件分类</h3>
      <div class="category-grid">
        <div class="category-card" data-filter="image"><svg viewBox="0 0 64 64"><rect x="8" y="8" width="48" height="48" rx="4"/><circle cx="22" cy="22" r="6"/><path d="M8 44l12-12 8 8 12-12 12 12"/></svg><div class="cat-label">图片</div><div class="tag">${imgCount} 个</div></div>
        <div class="category-card" data-filter="video"><svg viewBox="0 0 64 64"><rect x="8" y="12" width="48" height="40" rx="4"/><polygon points="26,22 26,42 42,32"/></svg><div class="cat-label">视频</div><div class="tag">${vidCount} 个</div></div>
        <div class="category-card" data-filter="audio"><svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="18"/><polygon points="26,22 26,42 42,32"/></svg><div class="cat-label">音频</div><div class="tag">${audCount} 个</div></div>
        <div class="category-card" data-filter="document"><svg viewBox="0 0 64 64"><path d="M20 8h18l10 10v36a2 2 0 0 1-2 2H20a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2z"/><polyline points="20 8 38 8 48 18 48 56"/><line x1="28" y1="28" x2="40" y2="28"/></svg><div class="cat-label">文档</div><div class="tag">${docCount} 个</div></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
        <div class="home-card"><h3 style="font-size:16px;font-weight:600">最近看过</h3>${recentFiles.map(f=>`<div class="recent-item">${getFileIconSmall(f.name)}<span style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${escapeHtml(f.name)}</span></div>`).join('')||'<div class="empty-state">暂无最近文件</div>'}</div>
        <div class="home-card"><h3 style="font-size:16px;font-weight:600">最近保存</h3>${recentItems.map(i=>`<div class="recent-item">${i.type==='dir'?getFolderIconSmall():getFileIconSmall(i.name)}<span style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${escapeHtml(i.name)}</span></div>`).join('')||'<div class="empty-state">暂无记录</div>'}</div>
      </div></div>`;
    v.innerHTML=html;
    document.getElementById('doSignBtn')?.addEventListener('click',()=>{
      if(signedToday)return;
      const pts=dailySignIn();
      if(pts===0)return;
      renderHome();
      showToast(`签到成功！获得 ${pts} 积分`);
    });
    document.querySelectorAll('.category-card').forEach(card=>{card.addEventListener('click',()=>{const filter=card.getAttribute('data-filter');if(filter){filterCat=filter;curTab='drive';pathStack=[{id:'0',name:filter==='image'?'圖片':filter==='video'?'視頻':filter==='audio'?'音頻':'文件'}];selection.clear();searchQuery='';searchInput.value='';editId=null;clearPressState();document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.id==='menu-drive'));document.getElementById('view-toggle').style.display='none';if(viewMode!=='card'){viewMode='card';document.getElementById('view-list').classList.remove('active');document.getElementById('view-card').classList.add('active');}updateSidebarButtons();render();}});});
    v.classList.add('fade-in');
    setTimeout(()=>v.classList.remove('fade-in'),300);
  }

  function clearPressState(){if(pressTimer)clearTimeout(pressTimer);pressTimer=null;pressTargetId=null;longPressActive=false;}
  function handlePressStart(e){
    const card=e.target.closest('.card-item');
    if(!card||curTab!=='drive'||viewMode!=='card')return;
    if(e.target.closest('.card-name, .inline-input'))return;
    const id=card.getAttribute('data-id');if(!id)return;
    const item=db.find(x=>x.id===id);if(!item||(item.type!=='file'&&item.type!=='dir'))return;
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    pressSX=cx;pressSY=cy;pressTargetId=id;longPressActive=false;
    clearTimeout(pressTimer);pressTimer=setTimeout(()=>{if(pressTargetId===id)longPressActive=true;pressTimer=null;},LONG_PRESS);
  }
  function handlePressMove(e){
    if(!pressTargetId)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    if(Math.abs(cx-pressSX)>DRAG_TH||Math.abs(cy-pressSY)>DRAG_TH)clearPressState();
  }
  function handlePressEnd(e){clearPressState();}

  document.addEventListener('mousedown',handlePressStart);
  document.addEventListener('touchstart',handlePressStart,{passive:false});
  document.addEventListener('mousemove',handlePressMove);
  document.addEventListener('touchmove',handlePressMove,{passive:false});
  document.addEventListener('mouseup',handlePressEnd);
  document.addEventListener('touchend',handlePressEnd);

  document.addEventListener('dragstart',function(e){
    const card=e.target.closest('.card-item');
    if(!card)return;
    if(!longPressActive||pressTargetId!==card.getAttribute('data-id')){safePreventDefault(e);return false;}
    startDrag(e);
  });
  function startDrag(e){
    const card=e.target.closest('.card-item');
    if(!card||curTab!=='drive'||viewMode!=='card')return;
    const id=card.getAttribute('data-id');const item=db.find(x=>x.id===id);
    if(!item||(item.type!=='file'&&item.type!=='dir'))return;
    draggingId=id;draggingType=item.type;
    card.style.transition='transform 0.3s, opacity 0.3s';card.style.transform='scale(0.95)';card.style.opacity='0.7';card.classList.add('locked');
    e.dataTransfer.setData('text/plain',id);e.dataTransfer.effectAllowed='move';
  }
  function endDrag(e){
    if(dropInProgress)return;
    const hadDrag=draggingId!==null;
    const card=document.querySelector(`.card-item[data-id="${draggingId}"]`);
    if(card){card.style.transition='';card.style.transform='';card.style.opacity='';card.classList.remove('locked');}
    document.querySelectorAll('.drag-active').forEach(f=>f.classList.remove('drag-active'));
    draggingId=null;draggingType=null;clearPressState();
    if(hadDrag)render();
  }
  document.addEventListener('dragend',endDrag);
  document.addEventListener('dragover',e=>{safePreventDefault(e);const fc=e.target.closest('.folder-item');if(fc&&!fc.classList.contains('drag-active')){fc.classList.add('drag-active');e.dataTransfer.dropEffect='move';}});
  document.addEventListener('dragleave',e=>{const fc=e.target.closest('.folder-item');if(fc&&!fc.contains(e.relatedTarget))fc.classList.remove('drag-active');});
  document.addEventListener('drop',function(e){
    safePreventDefault(e);
    const fc=e.target.closest('.folder-item');if(!fc||!draggingId)return;
    const folderId=fc.getAttribute('data-id');if(!folderId||folderId===draggingId)return;
    const src=db.find(x=>x.id===draggingId);if(!src)return;
    if(src.pid===folderId){showToast('項目已在該資料夾中');return;}
    if(src.type==='dir'&&isDescendant(draggingId,folderId)){showErrorModal('無法移動：目標為來源的子資料夾');return;}
    fc.classList.remove('drag-active');
    const sourceCard=document.querySelector(`.card-item[data-id="${draggingId}"]`);if(!sourceCard)return;
    dropInProgress=true;sourceCard.style.transition='';
    const sr=sourceCard.getBoundingClientRect(),tr=fc.getBoundingClientRect();
    sourceCard.classList.add('inhale');
    sourceCard.style.transform=`translate(${tr.left+tr.width/2-sr.left-sr.width/2}px, ${tr.top+tr.height/2-sr.top-sr.height/2}px) scale(0.08)`;
    sourceCard.style.opacity='0';
    setTimeout(()=>{fc.classList.add('jelly-anim');setTimeout(()=>fc.classList.remove('jelly-anim'),550);},200);
    const reset=()=>{
      sourceCard.removeEventListener('transitionend',reset);
      sourceCard.classList.remove('inhale','locked');sourceCard.style.transform='';sourceCard.style.opacity='';dropInProgress=false;
      try{if(draggingType==='file'){relocateItem(src,folderId);showToast(`已將 ${src.name} 移入資料夾`);}else{moveFolderRecursive(draggingId,folderId);showToast(`已將資料夾「${src.name}」移入`);}}catch(err){showErrorModal('移動失敗: '+err.message);}
      draggingId=null;draggingType=null;clearPressState();render();
    };
    sourceCard.addEventListener('transitionend',function handler(e){if(e.propertyName==='transform'||e.propertyName==='opacity'){sourceCard.removeEventListener('transitionend',handler);reset();}});
    setTimeout(()=>{if(dropInProgress&&sourceCard.style.transform.includes('scale'))reset();},900);
  });

  document.addEventListener('selectstart',e=>{let t=e.target;if(t&&!t.closest)t=t.parentElement;if(!t||!t.closest)return;if(!t.closest('input, textarea'))safePreventDefault(e);},{passive:false});
  window.addEventListener('dragover',e=>safePreventDefault(e));
  window.addEventListener('drop',e=>safePreventDefault(e));
  document.body.addEventListener('touchmove',function(e){},{passive:true});

  // 辅助函数：将 Data URL 转换为 Uint8Array
  function dataURLtoUint8Array(dataUrl) {
    const base64 = dataUrl.split(',')[1];
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
  }

  // 特殊搜索彩蛋：视窗 (只读预览)
  function showSpecialWindowImage(){
    const SPECIAL_ID = '__special_window__';
    if(openWindows.has(SPECIAL_ID)){
      const {win, tab} = openWindows.get(SPECIAL_ID);
      activateWindow(win, tab);
      return;
    }
    // 请将你的 Base64 图片数据替换下面的字符串
    const base64Data = "data:image/jpeg;base64,/* 在这里粘贴你的base64数据 */";
    const specialItem = {
      id: SPECIAL_ID,
      name: '视窗.jpg',
      type: 'file',
      readonly: true,
      content: dataURLtoUint8Array(base64Data)
    };
    specialItem.size = specialItem.content.length;
    createWindow(specialItem);
  }

  render();
  updateSidebarButtons();
})();
</script>
</body>
</html>
